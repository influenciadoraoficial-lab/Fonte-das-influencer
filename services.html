<!DOCTYPE html>

<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Serviços — Fonte das Influencers</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0d0f14;--bg2:#13161e;--bg3:#1a1d27;--border:#252836;--text:#e8eaf0;--muted:#8890a4;--accent:#25d366;--accent2:#1abe57;--card:#161923;--input-bg:#1e2130;--shadow:rgba(0,0,0,.5)}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;color:var(--accent);text-decoration:none}
    .logo span{color:var(--text)}
    .nav-links{display:flex;gap:8px;align-items:center}
    .nav-links a{color:var(--muted);text-decoration:none;font-size:.9rem;padding:7px 13px;border-radius:8px;transition:color .2s,background .2s}
    .nav-links a:hover{color:var(--text);background:var(--bg3)}
    .nav-links a.btn-nav{background:var(--accent);color:#fff;font-weight:600}
    .nav-links a.btn-nav:hover{background:var(--accent2)}
    .hero{max-width:1200px;margin:0 auto;padding:48px 24px 32px;text-align:center}
    .hero h1{font-family:'Syne',sans-serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;margin-bottom:12px}
    .hero h1 span{color:var(--accent)}
    .hero p{color:var(--muted);font-size:1rem;max-width:500px;margin:0 auto}
    .filters{max-width:1200px;margin:0 auto;padding:0 24px 24px;display:flex;gap:8px;flex-wrap:wrap}
    .filter-btn{background:var(--bg3);border:1px solid var(--border);border-radius:99px;padding:7px 16px;font-size:.85rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
    .filter-btn:hover,.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .search-bar{max-width:1200px;margin:0 auto;padding:0 24px 24px}
    .search-bar input{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:12px;padding:12px 18px;font-size:.95rem;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
    .search-bar input:focus{border-color:var(--accent)}
    .search-bar input::placeholder{color:var(--muted)}
    .services-grid{max-width:1200px;margin:0 auto;padding:0 24px 64px;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
    .service-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;transition:border-color .2s,transform .2s;cursor:pointer}
    .service-card:hover{border-color:var(--accent);transform:translateY(-2px)}
    .service-header{display:flex;justify-content:space-between;align-items:start;margin-bottom:12px}
    .service-platform{display:flex;align-items:center;gap:8px}
    .platform-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;background:var(--bg3)}
    .service-id{font-size:.75rem;color:var(--muted);font-weight:600}
    .service-name{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;margin-bottom:8px;line-height:1.4}
    .service-meta{display:flex;gap:16px;flex-wrap:wrap}
    .meta-item{font-size:.8rem;color:var(--muted)}
    .meta-item strong{color:var(--text);font-weight:600}
    .service-price{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--accent)}
    .service-price span{font-size:.75rem;color:var(--muted);font-weight:400}
    .btn-pedir{width:100%;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px;font-size:.875rem;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;margin-top:16px;transition:background .2s}
    .btn-pedir:hover{background:var(--accent2)}
    .loading{text-align:center;padding:80px 24px;color:var(--muted)}
    .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty{text-align:center;padding:80px 24px;color:var(--muted)}
    @media(max-width:600px){.nav-links{display:none}}
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Fonte das <span>Influencers</span></a>
  <div class="nav-links">
    <a href="index.html">Login</a>
    <a href="signup.html" class="btn-nav">Cadastrar</a>
    <a href="services.html">Serviços</a>
  </div>
</nav>

<div class="hero">
  <h1>Nossos <span>Serviços</span></h1>
  <p>Escolha o serviço ideal para impulsionar suas redes sociais com os melhores preços.</p>
</div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="🔍 Buscar serviço..."/>
</div>

<div class="filters" id="filters">
  <button class="filter-btn active" data-filter="all">Todos</button>
  <button class="filter-btn" data-filter="instagram">📸 Instagram</button>
  <button class="filter-btn" data-filter="tiktok">🎵 TikTok</button>
  <button class="filter-btn" data-filter="youtube">▶️ YouTube</button>
  <button class="filter-btn" data-filter="facebook">📘 Facebook</button>
  <button class="filter-btn" data-filter="twitter">🐦 Twitter/X</button>
  <button class="filter-btn" data-filter="telegram">✈️ Telegram</button>
</div>

<div id="servicesContainer">
  <div class="loading">
    <div class="spinner"></div>
    Carregando serviços...
  </div>
</div>

<script>
  const SMM_API_URL = 'https://wassmm.online/api/v2';
  const SMM_API_KEY = '6bb34f22f08fecf6baec4f6357175ffb';
  const MARGEM = 1.0577;

  const PLATFORM_ICONS = {
    instagram: '📸', tiktok: '🎵', youtube: '▶️', facebook: '📘',
    twitter: '🐦', x: '🐦', telegram: '✈️', spotify: '🎵',
    twitch: '🟣', linkedin: '💼', discord: '💬', snapchat: '👻'
  };

  function getPlatformIcon(name) {
    const n = name.toLowerCase();
    for (const [key, icon] of Object.entries(PLATFORM_ICONS)) {
      if (n.includes(key)) return icon;
    }
    return '⭐';
  }

  function getPlatformKey(name) {
    const n = name.toLowerCase();
    const platforms = ['instagram','tiktok','youtube','facebook','twitter','telegram','spotify','twitch','discord'];
    return platforms.find(p => n.includes(p)) || 'other';
  }

  let allServices = [];
  let currentFilter = 'all';

  async function loadServices() {
    try {
      const res = await fetch(SMM_API_URL, {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: new URLSearchParams({key: SMM_API_KEY, action: 'services'})
      });
      const data = await res.json();
      allServices = data.map(s => ({...s, rate: (parseFloat(s.rate) * MARGEM).toFixed(4)}));
      renderServices(allServices);
    } catch(e) {
      // Mostra serviços de exemplo se API falhar
      allServices = [
        {service:'1001', name:'Instagram - Seguidores Brasileiros', category:'Instagram', rate:'0.50', min:'100', max:'10000', type:'Default'},
        {service:'1002', name:'Instagram - Curtidas Reais', category:'Instagram', rate:'0.20', min:'50', max:'5000', type:'Default'},
        {service:'1003', name:'TikTok - Seguidores', category:'TikTok', rate:'0.40', min:'100', max:'10000', type:'Default'},
        {service:'1004', name:'YouTube - Visualizações', category:'YouTube', rate:'0.30', min:'500', max:'50000', type:'Default'},
        {service:'1005', name:'Facebook - Curtidas na Página', category:'Facebook', rate:'0.35', min:'100', max:'5000', type:'Default'},
        {service:'1006', name:'Twitter/X - Seguidores', category:'Twitter', rate:'0.45', min:'100', max:'10000', type:'Default'},
      ];
      renderServices(allServices);
    }
  }

  function renderServices(services) {
    const container = document.getElementById('servicesContainer');
    const search = document.getElementById('searchInput').value.toLowerCase();

    let filtered = services;
    if (currentFilter !== 'all') filtered = filtered.filter(s => getPlatformKey(s.name) === currentFilter || getPlatformKey(s.category||'') === currentFilter);
    if (search) filtered = filtered.filter(s => s.name.toLowerCase().includes(search));

    if (filtered.length === 0) {
      container.innerHTML = '<div class="empty">Nenhum serviço encontrado.</div>';
      return;
    }

    container.innerHTML = `<div class="services-grid">${filtered.map(s => `
      <div class="service-card" onclick="pedirServico(${s.service})">
        <div class="service-header">
          <div class="service-platform">
            <div class="platform-icon">${getPlatformIcon(s.name)}</div>
          </div>
          <span class="service-id">#${s.service}</span>
        </div>
        <div class="service-name">${s.name}</div>
        <div class="service-meta">
          <div class="meta-item">Mín: <strong>${Number(s.min).toLocaleString()}</strong></div>
          <div class="meta-item">Máx: <strong>${Number(s.max).toLocaleString()}</strong></div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px">
          <div class="service-price">R$ ${(parseFloat(s.rate)*1).toFixed(2)} <span>/ 1000</span></div>
        </div>
        <button class="btn-pedir">Fazer Pedido</button>
      </div>
    `).join('')}</div>`;
  }

  function pedirServico(id) {
    const usuario = localStorage.getItem('usuarioLogado');
    if (!usuario) {
      window.location.href = 'index.html';
      return;
    }
    window.location.href = `checkout.html?service=${id}`;
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      currentFilter = this.dataset.filter;
      renderServices(allServices);
    });
  });

  document.getElementById('searchInput').addEventListener('input', () => renderServices(allServices));

  loadServices();
</script>

</body>
</html>
