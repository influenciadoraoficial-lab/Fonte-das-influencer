  <style>
    :root{--bg:#0d0f14;--bg2:#13161e;--bg3:#1a1d27;--border:#252836;--text:#e8eaf0;--muted:#8890a4;--accent:#25d366;--accent2:#1abe57;--card:#161923;--input-bg:#1e2130;--shadow:rgba(0,0,0,.5)}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
    nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;height:62px;display:flex;align-items:center;justify-content:space-between}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;color:var(--accent);text-decoration:none}
    .logo span{color:var(--text)}
    nav a.login-link{color:var(--muted);text-decoration:none;font-size:.9rem;font-weight:500}
    nav a.login-link:hover{color:var(--text)}
    main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:100%;max-width:460px;box-shadow:0 8px 40px var(--shadow)}
    .card h1{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;margin-bottom:6px}
    .card p{color:var(--muted);font-size:.875rem;margin-bottom:28px;line-height:1.5}
    .form-group{margin-bottom:16px}
    .form-group label{display:block;font-size:.85rem;font-weight:600;margin-bottom:6px}
    .form-group input{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:10px;padding:11px 14px;font-size:.93rem;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s}
    .form-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,211,102,.12)}
    .form-group input::placeholder{color:var(--muted)}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:13px;font-size:1rem;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:background .2s,transform .15s;margin-top:4px}
    .btn:hover{background:var(--accent2);transform:translateY(-1px)}
    .footer-text{text-align:center;margin-top:20px;font-size:.85rem;color:var(--muted)}
    .footer-text a{color:var(--accent);text-decoration:none;font-weight:600}
    .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:.8rem}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .terms{font-size:.78rem;color:var(--muted);text-align:center;margin-top:16px;line-height:1.5}
    .terms a{color:var(--accent);text-decoration:none}
    .alert{display:none;background:rgba(37,211,102,.1);border:1px solid var(--accent);border-radius:10px;padding:12px 16px;font-size:.875rem;color:var(--accent);margin-bottom:16px}
    .alert.error{background:rgba(239,68,68,.1);border-color:#ef4444;color:#ef4444}
  </style>
</head>

<script>
  const SMM_API_URL = 'https://wassmm.online/api/v2';
  const SMM_API_KEY = '6bb34f22f08fecf6baec4f6357175ffb';

  function showAlert(msg, type='success') {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = 'alert' + (type==='error' ? ' error' : '');
    el.style.display = 'block';
  }

  document.getElementById('btnCadastrar').addEventListener('click', async function() {
    const nome     = document.getElementById('nome').value.trim();
    const username = document.getElementById('username').value.trim();
    const email    = document.getElementById('email').value.trim();
    const senha    = document.getElementById('senha').value;
    const senha2   = document.getElementById('senha2').value;

    if (!nome || !username || !email || !senha) return showAlert('Preencha todos os campos obrigatórios.', 'error');
    if (senha !== senha2) return showAlert('As senhas não coincidem.', 'error');
    if (senha.length < 6) return showAlert('A senha deve ter pelo menos 6 caracteres.', 'error');

    this.textContent = '⏳ Criando conta...';
    this.disabled = true;

    // Salva usuário localmente
    const usuarios = JSON.parse(localStorage.getItem('usuarios') || '[]');
    if (usuarios.find(u => u.username === username || u.email === email)) {
      showAlert('Usuário ou e-mail já cadastrado.', 'error');
      this.textContent = 'Criar conta grátis';
      this.disabled = false;
      return;
    }

    const novoUsuario = { nome, username, email, senha, saldo: 0, pedidos: [], criadoEm: new Date().toISOString() };
    usuarios.push(novoUsuario);
    localStorage.setItem('usuarios', JSON.stringify(usuarios));
    localStorage.setItem('usuarioLogado', JSON.stringify(novoUsuario));

    showAlert('Conta criada com sucesso! Redirecionando...');
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
  });
</script>
